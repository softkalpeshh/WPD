﻿
<html>
<head>
    <title>HTML Forms</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #a8d8ea; /* background color */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-box {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input[type=text] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .options {
            margin-bottom: 15px;
        }

        input[type=submit] {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

            input[type=submit]:hover {
                background-color: #45a049;
            }
    </style>
</head>

<body>

    <div class="form-box">

        <h2>HTML Form</h2>

        <form>

            <label>First Name:</label>
            <input type="text" name="firstname">

            <label>Last Name:</label>
            <input type="text" name="lastname">

            <div class="options">
                <input type="radio" name="language"> HTML <br>
                <input type="radio" name="language"> CSS <br>
                <input type="radio" name="language"> JavaScript
            </div>

            <div class="options">
                <input type="checkbox"> I have a bike <br>
                <input type="checkbox"> I have a car <br>
                <input type="checkbox"> I have a boat
            </div>

            <input type="submit" value="Submit">

        </form>

    </div>

</body>
</html>
