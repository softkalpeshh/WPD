<html>
<head>
    <title>Border Styles in HTML</title>
    <style>
        body {
            border: 8px solid black;
            margin: 20px;
            padding: 20px;
        }

        p {
            padding: 10px;
            margin: 10px;
        }

        .p1 {
            border: 2px solid pink;
        }

        .p2 {
            border: 2px dashed yellow;
        }

        .p3 {
            border: 2px dotted green;
        }

        .p4 {
            border: 4px double blue;
        }

        .p5 {
            border: 4px groove brown;
        }
    </style>
</head>
<body>

    <h2>Types of Border </h2>

    <p class="p1">WPD PRATICAL 06</p>
    <p class="p2">kalpesh ahire</p>
    <p class="p3">MET BKC Institude poiytechnic, </p>
    <p class="p4">DEPARTMENT:- Iformation Technology</p>
    <p class="p5">ROLL NO :- 02</p>
